<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tulips for her 🌷</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at center, #1a0205 0%, #060002 60%, #010001 100%);
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, CX, BASE;

function resize() {
  W    = canvas.width  = window.innerWidth;
  H    = canvas.height = window.innerHeight;
  CX   = W / 2;
  BASE = H * 0.87;
}
resize();
window.addEventListener('resize', resize);

/* ── helpers ─────────────────────────────── */
const clamp   = (v,a,b) => Math.max(a, Math.min(b, v));
const easeOut = x => 1 - Math.pow(1 - x, 3);
const seg     = (p,s,e) => easeOut(clamp((p-s)/(e-s), 0, 1));

/* ── stars ───────────────────────────────── */
const STARS = Array.from({length: 220}, () => ({
  x:     Math.random(),
  y:     Math.random() * 0.80,
  r:     Math.random() * 1.1 + 0.15,
  phase: Math.random() * Math.PI * 2,
  speed: 0.022 + Math.random() * 0.038,
  gold:  Math.random() < 0.18
}));

function drawBg() {
  // A deep, romantic background to make the sunset pink tulips glow
  const bg = ctx.createRadialGradient(CX, H*0.5, 10, CX, H*0.35, H*0.75);
  bg.addColorStop(0,    '#2b1821'); 
  bg.addColorStop(0.38, '#141117');
  bg.addColorStop(0.72, '#06080a');
  bg.addColorStop(1,    '#020404');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  
  const pool = ctx.createRadialGradient(CX, BASE+20, 5, CX, BASE-40, 260);
  pool.addColorStop(0, 'rgba(100, 40, 60, 0.25)');
  pool.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = pool;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  for (const s of STARS) {
    s.phase += s.speed;
    const a = 0.15 + 0.48 * Math.abs(Math.sin(s.phase));
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.gold ? `rgba(255,210,210,${a})` : `rgba(255,240,240,${a})`;
    ctx.fill();
  }
}

/* ── sparkles ────────────────────────────── */
const SPARKS = Array.from({length: 32}, () => { const s={}; resetSp(s); s.life=Math.random()*s.max; return s; });
function resetSp(s) {
  s.x    = CX + (Math.random()-0.5)*250;
  s.y    = BASE - 60 - Math.random()*350;
  s.vy   = -0.26 - Math.random()*0.52;
  s.life = 0;
  s.max  = 0.6 + Math.random()*0.5;
  s.sz   = 1.5 + Math.random()*2.5;
  // Soft pink, peach, and white sparkles to match the tulip field
  s.hue  = Math.random()<0.5 ? 330+Math.random()*30 : 10+Math.random()*20; 
}
function drawSparkles(show) {
  if (!show) return;
  for (const s of SPARKS) {
    s.life += 0.009;
    if (s.life > s.max) resetSp(s);
    const a = Math.sin((s.life/s.max)*Math.PI) * show;
    ctx.beginPath();
    ctx.arc(s.x + Math.sin(s.life*4)*5, s.y + s.vy*s.life*55, s.sz, 0, Math.PI*2);
    ctx.fillStyle   = `hsla(${s.hue},100%,80%,${a})`;
    ctx.shadowColor = `hsla(${s.hue},100%,90%,${a})`;
    ctx.shadowBlur  = 12;
    ctx.fill();
    ctx.shadowBlur  = 0;
  }
}

/* ── bezier helpers ──────────────────────── */
function bezPt(x0,y0, cx1,cy1, cx2,cy2, x1,y1, t) {
  const m = 1-t;
  return [
    m*m*m*x0 + 3*m*m*t*cx1 + 3*m*t*t*cx2 + t*t*t*x1,
    m*m*m*y0 + 3*m*m*t*cy1 + 3*m*t*t*cy2 + t*t*t*y1
  ];
}

function bezAngle(x0,y0, cx1,cy1, cx2,cy2, x1,y1, t) {
  const m = 1-t;
  const dx = 3*m*m*(cx1-x0) + 6*m*t*(cx2-cx1) + 3*t*t*(x1-cx2);
  const dy = 3*m*m*(cy1-y0) + 6*m*t*(cy2-cy1) + 3*t*t*(y1-cy2);
  return Math.atan2(dy, dx);
}

function drawStem(x0,y0, cx1,cy1, cx2,cy2, x1,y1, prog, thick, col) {
  if (prog <= 0) return;
  ctx.beginPath();
  const steps = 48;
  for (let i = 0; i <= steps*prog; i++) {
    const [px,py] = bezPt(x0,y0,cx1,cy1,cx2,cy2,x1,y1, i/steps);
    i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.strokeStyle = col;
  ctx.lineWidth   = thick;
  ctx.lineCap     = 'round';
  ctx.shadowColor = col;
  ctx.shadowBlur  = 3;
  ctx.stroke();
  ctx.shadowBlur  = 0;
}

/* ── tall, fleshy tulip leaves ───────────── */
function drawLeaf(x, y, rot, size, prog) {
  if (prog <= 0) return;
  const s = size * prog;
  
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  // Tulip leaves are broad, smooth, and taper elegantly
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(s * 0.3, s * 0.25, s * 0.8, s * 0.1, s, 0);
  ctx.bezierCurveTo(s * 0.8, -s * 0.15, s * 0.3, -s * 0.25, 0, 0);
  
  // A milky, glaucous green gradient typical of tulip leaves
  const lg = ctx.createLinearGradient(0, 0, s, 0);
  lg.addColorStop(0, '#2e5441');
  lg.addColorStop(0.5, '#4b7a62');
  lg.addColorStop(1, '#335e47');
  ctx.fillStyle = lg;
  ctx.fill();

  // Subtle central vein highlight
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(s * 0.5, 0, s * 0.9, 0);
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
  ctx.lineWidth = s * 0.03;
  ctx.stroke();

  ctx.restore();
}

/* ── perfectly cupped pink tulip ─────────── */
function drawFlower(x, y, size, prog, t, wob, stemAngle) {
  if (prog <= 0) return;
  
  const s   = size * prog * 1.5; 
  // Tulips stand quite straight up, less nodding than lilies
  const rot = (stemAngle + Math.PI/2) * 0.2 + Math.sin(t*0.001 + wob) * 0.03;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  // Gradient replicating the beautiful pink tulip in your image
  const petalGrad = ctx.createLinearGradient(0, -s, 0, 0);
  petalGrad.addColorStop(0, '#fce4ec');    // Almost white/light pink edge
  petalGrad.addColorStop(0.3, '#f48fb1');  // Soft romantic pink
  petalGrad.addColorStop(0.7, '#d81b60');  // Deep rich pink body
  petalGrad.addColorStop(1, '#7a9650');    // Yellow/green base where it meets stem

  ctx.fillStyle = petalGrad;

  // Magical outer glow
  ctx.shadowColor = 'rgba(255, 105, 180, 0.5)';
  ctx.shadowBlur = 15 * prog;

  // 1. BACK CENTER PETAL
  ctx.beginPath();
  ctx.moveTo(-s * 0.1, 0);
  ctx.bezierCurveTo(-s * 0.35, -s * 0.4, -s * 0.25, -s * 0.95, 0, -s * 1.05);
  ctx.bezierCurveTo(s * 0.25, -s * 0.95, s * 0.35, -s * 0.4, s * 0.1, 0);
  ctx.fill();

  // 2. BACK LEFT PETAL
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-s * 0.4, -s * 0.1, -s * 0.55, -s * 0.7, -s * 0.3, -s * 0.95);
  ctx.bezierCurveTo(-s * 0.1, -s * 0.8, 0, -s * 0.4, 0, 0);
  ctx.fill();

  // 3. BACK RIGHT PETAL
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(s * 0.4, -s * 0.1, s * 0.55, -s * 0.7, s * 0.3, -s * 0.95);
  ctx.bezierCurveTo(s * 0.1, -s * 0.8, 0, -s * 0.4, 0, 0);
  ctx.fill();

  // Turn down the glow to separate the internal layers
  ctx.shadowBlur = 5;
  ctx.shadowColor = 'rgba(0, 0, 0, 0.25)';

  // 4. FRONT LEFT PETAL
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-s * 0.45, -s * 0.3, -s * 0.45, -s * 0.85, -s * 0.1, -s * 1.0);
  ctx.bezierCurveTo(0, -s * 0.8, s * 0.1, -s * 0.3, 0, 0);
  ctx.fill();

  // 5. FRONT RIGHT PETAL
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(s * 0.45, -s * 0.3, s * 0.45, -s * 0.85, s * 0.1, -s * 1.0);
  ctx.bezierCurveTo(0, -s * 0.8, -s * 0.1, -s * 0.3, 0, 0);
  ctx.fill();

  // 6. CENTER FRONT WRAPPING PETAL (The overlapping classic tulip look)
  // Give the front petal an even brighter highlight to make it pop
  const frontGrad = ctx.createLinearGradient(0, -s, 0, 0);
  frontGrad.addColorStop(0, '#ffffff'); // Pure white edge
  frontGrad.addColorStop(0.2, '#ff80ab');
  frontGrad.addColorStop(0.7, '#c2185b');
  frontGrad.addColorStop(1, '#556b2f');
  ctx.fillStyle = frontGrad;

  ctx.beginPath();
  ctx.moveTo(-s * 0.15, 0);
  ctx.bezierCurveTo(-s * 0.35, -s * 0.4, -s * 0.25, -s * 0.9, 0, -s * 0.95);
  ctx.bezierCurveTo(s * 0.25, -s * 0.9, s * 0.35, -s * 0.4, s * 0.15, 0);
  ctx.fill();

  // Delicate stroke to highlight the overlapping petal edge
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.lineWidth = s * 0.015;
  ctx.stroke();

  ctx.restore();
}

/* ════════════════════════════════════════════
   STEMS
   ════════════════════════════════════════════ */
const START    = Date.now();
const DURATION = 5400;
let   progress = 0;

function buildStems(sc) {
  // Tulips have very straight, proud stems
  return [
    { bxo: -100*sc, byo: 0, cp1x: -110*sc, cp1y: -100*sc, cp2x: -120*sc, cp2y: -220*sc, tx: -130*sc, ty: -310*sc, fs: 36*sc, ps:[0.05, 0.46], wob: 1.3 },
    { bxo: -45*sc,  byo: 0, cp1x: -50*sc,  cp1y: -70*sc,  cp2x: -55*sc,  cp2y: -150*sc, tx: -65*sc,  ty: -230*sc, fs: 28*sc, ps:[0.03, 0.41], wob: 0.5 },
    { bxo:   0,     byo: 0, cp1x:   0,     cp1y: -130*sc, cp2x:   0,     cp2y: -265*sc, tx:   0,     ty: -400*sc, fs: 46*sc, ps:[0.00, 0.37], wob: 0.0 },
    { bxo:  45*sc,  byo: 0, cp1x:  50*sc,  cp1y: -70*sc,  cp2x:  55*sc,  cp2y: -150*sc, tx:  65*sc,  ty: -230*sc, fs: 28*sc, ps:[0.04, 0.42], wob: -0.5 },
    { bxo:  100*sc, byo: 0, cp1x:  110*sc, cp1y: -100*sc, cp2x:  120*sc, cp2y: -220*sc, tx: 130*sc,  ty: -310*sc, fs: 36*sc, ps:[0.06, 0.47], wob: -1.4 },
  ];
}

function draw() {
  const elapsed = Date.now() - START;
  progress = Math.min(elapsed / DURATION, 1);
  const p  = progress;
  const t  = elapsed;

  ctx.clearRect(0, 0, W, H);
  drawBg();
  drawStars();

  let sc = Math.min(W,H) / 700;
  if (W < 600) sc = W / 350; 

  const bx    = CX;
  const by    = BASE;
  // Tulip stems are a slightly milky, cool green
  const SD    = '#365e47'; 
  const SL    = '#518567';   
  const stems = buildStems(sc);

  /* STEMS + LEAVES + FLOWERS */
  stems.forEach((st, idx) => {
    const sx0  = bx + st.bxo,  sy0  = by;
    const sx1  = bx + st.tx,   sy1  = by + st.ty;
    const cp1x = bx + st.cp1x, cp1y = by + st.cp1y;
    const cp2x = bx + st.cp2x, cp2y = by + st.cp2y;
    const sp   = seg(p, st.ps[0], st.ps[1]);

    drawStem(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, sp, 3.8*sc, SD);
    drawStem(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, sp, 2.0*sc, SL);

    /* — Tulip leaves wrapping up the lower stem — */
    const leafData = [
      { t: 0.20, dir: -1 }, 
      { t: 0.35, dir: 1 }
    ];

    leafData.forEach((leaf) => {
      if (sp > leaf.t) {
        const [lx, ly] = bezPt(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, leaf.t);
        const lAngle   = bezAngle(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, leaf.t);
        
        // Tulip leaves hug the stem closely and point upwards
        // So we use a very shallow rotation angle
        const leafRot  = lAngle + (Math.PI / 8) * leaf.dir; 
        const lProg    = clamp((sp - leaf.t) * 5, 0, 1); 
        
        drawLeaf(lx, ly, leafRot, st.fs * 2.2, lProg);
      }
    });

    /* — flower — */
    const curT     = Math.min(sp, 1);
    const [fx, fy] = bezPt(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, curT);
    const angle    = bezAngle(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, curT);
    const fp       = seg(p, st.ps[1]-0.05, st.ps[1]+0.22);
    
    drawFlower(fx, fy, st.fs, fp, t, st.wob, angle);
  });

  /* SPARKLES */
  drawSparkles(seg(p, 0.32, 0.54));

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
